---
layout: default
title: Blog
---
<h1>Latest Posts</h1>

<ul style="list-style-type:none;">
  {% for post in site.posts %}
    <li>
      <h2 style="margin:0"><a href="{{ post.url }}">{{ post.title }}</a></h2>
      <h4 style="margin:0"> {{ post.date | date_to_string }} </h4>
      {{ post.excerpt }}
    </li>
  {% endfor %}
</ul>
